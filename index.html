<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartTable Ica - Prototipo</title>
<style>
  /* ============================================================
     PANEL DE CONTROL DE COLORES
     Paleta naranja vivo, igual a la del prototipo de referencia.
     Cambia estos valores para modificar TODA la app de una vez.
     ============================================================ */
  :root {
    --color-primary: #F2751E;
    --color-primary-dark: #D9600F;
    --color-primary-light: #FDECD8;
    --color-dark: #241A11;
    --color-dark-2: #34261A;
    --color-bg: #FDF8F2;
    --color-card: #FFFFFF;
    --color-border: #F1E2CC;
    --color-text: #2B2018;
    --color-text-muted: #8A7A68;
  }

  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Segoe UI", Arial, sans-serif; background: var(--color-bg); margin: 0; padding: 40px 16px; display: flex; justify-content: center; }
  .stw { max-width: 420px; width: 100%; background: var(--color-card); border-radius: 20px; padding: 16px; border: 0.5px solid var(--color-border); box-shadow: 0 6px 24px rgba(0,0,0,0.08); position: relative; }
  .stw-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .stw-logo { width: 28px; height: 28px; border-radius: 8px; background: var(--color-primary); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .stw-title { font-size: 14px; font-weight: 500; color: var(--color-text); margin: 0; }
  .stw-sub { font-size: 11px; color: var(--color-text-muted); margin: 0; }
  .stw-waiter { margin-left: auto; width: 32px; height: 32px; border-radius: 50%; background: var(--color-card); border: 0.5px solid var(--color-border); display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .stw-tabs { display: flex; background: var(--color-primary-light); border-radius: 999px; padding: 3px; margin: 14px 0; overflow-x: auto; }
  .stw-tab { flex: 1; text-align: center; font-size: 11px; padding: 7px 4px; border-radius: 999px; cursor: pointer; color: var(--color-text-muted); transition: all 0.2s; border: none; background: transparent; font-family: inherit; white-space: nowrap; }
  .stw-tab.active { background: var(--color-dark); color: #FFFFFF; }
  .stw-panel { animation: fadeUp 0.35s ease; min-height: 320px; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .stw-card { background: var(--color-card); border: 0.5px solid var(--color-border); border-radius: 12px; padding: 10px; display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .stw-thumb { width: 42px; height: 42px; border-radius: 8px; background: var(--color-primary-light); flex-shrink: 0; }
  .stw-name { font-size: 13px; color: var(--color-text); margin: 0; }
  .stw-price { font-size: 12px; color: var(--color-primary-dark); font-weight: 600; margin: 0; }
  .stw-btn { background: var(--color-primary); color: #FFFFFF; border: none; border-radius: 10px; padding: 12px; font-size: 13px; font-weight: 500; width: 100%; cursor: pointer; font-family: inherit; margin-top: 6px; }
  .stw-btn:hover { background: var(--color-primary-dark); }
  .stw-btn-outline { background: var(--color-card); color: var(--color-text); border: 0.5px solid var(--color-border); border-radius: 10px; padding: 12px; font-size: 13px; font-weight: 500; width: 100%; cursor: pointer; font-family: inherit; margin-top: 6px; }
  .stw-qty { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .stw-qty button { width: 22px; height: 22px; border-radius: 50%; border: 0.5px solid var(--color-border); background: var(--color-card); cursor: pointer; font-size: 13px; color: var(--color-text); }
  .stw-chips { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; }
  .stw-chip { padding: 6px 12px; border-radius: 999px; border: 0.5px solid var(--color-border); background: var(--color-card); font-size: 11px; color: var(--color-text-muted); cursor: pointer; white-space: nowrap; font-family: inherit; }
  .stw-chip.active { background: var(--color-primary); border-color: var(--color-primary); color: #FFFFFF; }
  .stw-pay-option { background: var(--color-card); border-radius: 12px; padding: 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 8px; cursor: pointer; border: 1.5px solid var(--color-border); }
  .stw-pay-option.selected { border-color: var(--color-primary); background: var(--color-primary-light); }
  .stw-toast { position: absolute; bottom: 16px; left: 16px; right: 16px; background: var(--color-dark); color: #FFF; font-size: 12px; padding: 10px 14px; border-radius: 10px; text-align: center; animation: fadeUp 0.3s ease; }

  /* ---- Tarjetas de menú tipo grid (con imagen, badges y botón +) ---- */
  .stw-menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .stw-menu-card { background: var(--color-card); border: 0.5px solid var(--color-border); border-radius: 14px; overflow: hidden; }
  .stw-menu-thumb { position: relative; height: 78px; background: linear-gradient(135deg, var(--color-primary-light), #FFDDAF); display: flex; align-items: center; justify-content: center; }
  .stw-menu-thumb i { font-size: 24px; color: var(--color-primary); opacity: 0.55; }
  .stw-menu-icon-badge { width: 42px; height: 42px; border-radius: 50%; background: rgba(255,255,255,0.75); display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
  .stw-menu-icon-badge svg { width: 22px; height: 22px; color: var(--color-primary-dark); }
  .stw-menu-badge { position: absolute; top: 6px; font-size: 8.5px; font-weight: 700; padding: 3px 7px; border-radius: 999px; color: #fff; letter-spacing: 0.2px; }
  .stw-menu-badge.spicy { left: 6px; background: #E0473A; }
  .stw-menu-badge.popular { right: 6px; background: var(--color-primary); }
  .stw-menu-info { display: flex; align-items: center; justify-content: space-between; gap: 6px; padding: 8px 9px; }
  .stw-menu-name { font-size: 11.5px; color: var(--color-text); margin: 0 0 2px; font-weight: 500; line-height: 1.2; }
  .stw-menu-price { font-size: 12px; color: var(--color-primary-dark); font-weight: 700; margin: 0; }
  .stw-menu-add { width: 24px; height: 24px; border-radius: 50%; background: var(--color-primary); border: none; color: #fff; font-size: 15px; line-height: 1; cursor: pointer; flex-shrink: 0; }

  /* ---- Splash con foto de fondo ---- */
  .stw-splash {
    position: relative;
    border-radius: 20px;
    padding: 26px 22px 22px;
    text-align: center;
    animation: fadeUp 0.4s ease;
    overflow: hidden;
    min-height: 480px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    background-image:
      linear-gradient(180deg, rgba(36,26,17,0.55) 0%, rgba(36,26,17,0.35) 35%, rgba(24,17,11,0.88) 100%),
      var(--splash-photo);
    background-size: cover;
    background-position: center;
  }
  .stw-splash-logo { width: 44px; height: 44px; margin: 0 auto 12px; border-radius: 12px; background: rgba(36,26,17,0.55); backdrop-filter: blur(2px); border: 1px solid var(--color-primary); display: flex; align-items: center; justify-content: center; }
  .stw-splash-title { font-size: 25px; font-weight: 700; margin: 0; letter-spacing: 0.5px; color: #FFFFFF; text-shadow: 0 2px 10px rgba(0,0,0,0.35); }
  .stw-splash-title .g { color: var(--color-primary); }
  .stw-splash-tag { font-size: 12px; color: #F0E6D6; margin: 8px 0 4px; }
  .stw-splash-quote { font-size: 12px; font-style: italic; color: #D8C9AE; margin: 4px 0 20px; }
  .stw-splash-quote .g { color: var(--color-primary); font-style: normal; }
  .stw-splash-btn { background: var(--color-primary); color: #221708; border: none; border-radius: 10px; padding: 13px; font-size: 13px; font-weight: 700; width: 100%; cursor: pointer; font-family: inherit; }
  .stw-splash-btn:hover { background: var(--color-primary-dark); color: #fff; }
  .stw-splash-foot { font-size: 10px; color: #C9B99E; margin-top: 12px; }
</style>
</head>
<body>
<div class="stw" id="stw-root">
  <div id="stw-splash-holder"></div>
  <div id="stw-app-holder" style="display:none">
    <div class="stw-header">
      <div class="stw-logo" id="stw-header-logo"></div>
      <div>
        <p class="stw-title">Sistema de mesas digitales</p>
        <p class="stw-sub">Restaurantes de Ica</p>
      </div>
      <div class="stw-waiter" id="stw-waiter-btn" onclick="callWaiter()" title="Llamar al mesero"></div>
    </div>
    <div class="stw-tabs" id="stw-tabs"></div>
    <div class="stw-panel" id="stw-panel"></div>
  </div>
  <div id="stw-toast-holder"></div>
</div>

/* ============================================================
   PANEL DE CONTROL - TEXTOS DE BIENVENIDA (pantalla splash)
   ============================================================ */
function renderSplash() {
  document.getElementById('stw-splash-holder').innerHTML =
    '<div class="stw-splash">' +
    '<div class="stw-splash-logo">' + PHONE_ICON.replace('viewBox', 'style="width:22px;height:22px;color:var(--color-primary)" viewBox') + '</div>' +
    '<p class="stw-splash-title">SMART<span class="g">TABLE</span> ICA</p>' +
    '<p class="stw-splash-tag">Mesas digitales interactivas para restaurantes</p>' +
    '<p class="stw-splash-quote">"La nueva <span class="g">experiencia digital</span> para restaurantes de Ica"</p>' +
    '<button class="stw-splash-btn" onclick="enterApp()">Comenzar</button>' +
    '<p class="stw-splash-foot">Toca la mesa para explorar el menú y pedir</p>' +
    '</div>';
}
function enterApp() {
  document.getElementById('stw-splash-holder').style.display = 'none';
  document.getElementById('stw-app-holder').style.display = 'block';
  render();
}
renderSplash();
document.getElementById('stw-header-logo').innerHTML = PHONE_ICON.replace('viewBox', 'style="width:15px;height:15px;color:#fff" viewBox');
document.getElementById('stw-waiter-btn').innerHTML = BELL_ICON.replace('viewBox', 'style="width:15px;height:15px;color:var(--color-text)" viewBox');
const tabs = [
  { id: 'inicio', label: 'Inicio' },
  { id: 'menu', label: 'Menú' },
  { id: 'carrito', label: 'Carrito' },
  { id: 'pago', label: 'Pago' },
  { id: 'confirmacion', label: 'Confirmación' }
];
function priceOf(name) {
  for (const cat of categories) {
    const item = menu[cat].find(i => i.n === name);
    if (item) return item.p;
  }
  return 0;
}
function renderTabs() {
  document.getElementById('stw-tabs').innerHTML = tabs.map(t =>
    '<button class="stw-tab' + (tab === t.id ? ' active' : '') + '" onclick="setTab(\'' + t.id + '\')">' + t.label + '</button>'
  ).join('');
}
function setTab(id) { tab = id; render(); }
function setCategory(c) { activeCategory = c; render(); }
function addToCart(name) {
  cart[name] = (cart[name] || 0) + 1;
  render();
  showToast(name + ' agregado');
}
function changeQty(name, delta) {
  cart[name] = Math.max(0, (cart[name] || 0) + delta);
  render();
}
function setPayMethod(m) { payMethod = m; render(); }
function callWaiter() { showToast('Mesero notificado, en camino'); }
function showToast(msg) {
  const holder = document.getElementById('stw-toast-holder');
  holder.innerHTML = '<div class="stw-toast">' + msg + '</div>';
  setTimeout(() => { holder.innerHTML = ''; }, 1800);
}
function cartTotals() {
  const subtotal = Object.entries(cart).filter(([,q]) => q > 0).reduce((a, [n, q]) => a + priceOf(n) * q, 0);
  const igv = subtotal * 0.18;
  return { subtotal, igv, total: subtotal + igv };
}
function render() {
  renderTabs();
  const panel = document.getElementById('stw-panel');
  if (tab === 'inicio') {
    panel.innerHTML =
      '<div style="background:var(--color-primary);border-radius:14px;padding:16px;color:#fff;margin-bottom:12px">' +
      '<p style="font-size:14px;font-weight:500;margin:0 0 4px">Sabores de Ica</p>' +
      '<p style="font-size:11px;opacity:0.9;margin:0">Bienvenido a tu mesa digital</p></div>' +
      '<p style="font-size:12px;color:var(--color-text-muted);margin:0 0 8px">Toca cualquier pestaña para explorar el menú, armar tu pedido y pagar cuando quieras.</p>' +
      '<button class="stw-btn" onclick="setTab(\'menu\')">Ver el menú</button>' +
      '<button class="stw-btn-outline" onclick="callWaiter()"><span style="display:inline-flex;width:14px;height:14px;vertical-align:-2px;margin-right:4px;color:currentColor">' + BELL_ICON + '</span>Llamar al mesero</button>';
  } else if (tab === 'menu') {
    panel.innerHTML =
      '<div class="stw-chips">' + categories.map(c =>
        '<button class="stw-chip' + (activeCategory === c ? ' active' : '') + '" onclick="setCategory(\'' + c + '\')">' + c + '</button>'
      ).join('') + '</div>' +
      '<div class="stw-menu-grid">' + menu[activeCategory].map(it =>
        '<div class="stw-menu-card">' +
          '<div class="stw-menu-thumb"' + (it.img && DISH_PHOTOS[it.img] ? ' style="background-image:url(' + DISH_PHOTOS[it.img] + ');background-size:cover;background-position:center"' : '') + '>' +
            (it.spicy ? '<span class="stw-menu-badge spicy">Picante</span>' : '') +
            (it.popular ? '<span class="stw-menu-badge popular">Popular</span>' : '') +
            (it.img && DISH_PHOTOS[it.img] ? '' : '<span class="stw-menu-icon-badge">' + DISH_ICON + '</span>') +
          '</div>' +
          '<div class="stw-menu-info">' +
            '<div><p class="stw-menu-name">' + it.n + '</p><p class="stw-menu-price">S/ ' + it.p.toFixed(2) + '</p></div>' +
            '<button class="stw-menu-add" onclick="addToCart(\'' + it.n + '\')">+</button>' +
          '</div>' +
        '</div>'
      ).join('') + '</div>' +
      '<button class="stw-btn" onclick="setTab(\'carrito\')">Ver carrito</button>';
  } else if (tab === 'carrito') {
    const t = cartTotals();
    const items = Object.entries(cart).filter(([,q]) => q > 0);
    panel.innerHTML = (items.length ? items.map(([n, q]) =>
      '<div class="stw-card"><div class="stw-thumb"></div><div style="flex:1"><p class="stw-name">' + n + '</p><p class="stw-price">S/ ' + priceOf(n).toFixed(2) + '</p></div>' +
      '<div class="stw-qty"><button onclick="changeQty(\'' + n + '\',-1)">-</button><span style="font-size:13px;min-width:14px;text-align:center">' + q + '</span><button onclick="changeQty(\'' + n + '\',1)">+</button></div></div>'
    ).join('') : '<p style="font-size:12px;color:var(--color-text-muted);text-align:center;padding:20px 0">Tu carrito está vacío.</p>') +
      '<div style="display:flex;justify-content:space-between;padding:4px 4px;font-size:12px;color:var(--color-text-muted)"><span>Subtotal</span><span>S/ ' + t.subtotal.toFixed(2) + '</span></div>' +
      '<div style="display:flex;justify-content:space-between;padding:4px 4px;font-size:12px;color:var(--color-text-muted)"><span>IGV (18%)</span><span>S/ ' + t.igv.toFixed(2) + '</span></div>' +
      '<div style="display:flex;justify-content:space-between;padding:8px 4px 4px;font-size:14px;font-weight:600;color:var(--color-text);border-top:0.5px solid var(--color-border);margin-top:4px"><span>Total</span><span>S/ ' + t.total.toFixed(2) + '</span></div>' +
      '<button class="stw-btn" onclick="setTab(\'pago\')">Ir a pagar</button>';
  } else if (tab === 'pago') {
    const t = cartTotals();
    const methods = [
      { id: 'Tarjeta', icon: CARD_ICON },
      { id: 'QR / Yape / Plin', icon: QR_ICON },
      { id: 'Billetera digital', icon: WALLET_ICON }
    ];
    panel.innerHTML =
      '<p style="font-size:12px;color:var(--color-text-muted);margin:0 0 10px">Elige tu método de pago</p>' +
      methods.map(m =>
        '<div class="stw-pay-option' + (payMethod === m.id ? ' selected' : '') + '" onclick="setPayMethod(\'' + m.id + '\')">' +
        '<span style="display:inline-flex;width:18px;height:18px;color:var(--color-text)">' + m.icon + '</span><span style="font-size:13px;color:var(--color-text)">' + m.id + '</span></div>'
      ).join('') +
      '<div style="display:flex;justify-content:space-between;padding:10px 4px;font-size:14px;font-weight:600;color:var(--color-text);margin-top:6px"><span>Total a pagar</span><span>S/ ' + t.total.toFixed(2) + '</span></div>' +
      '<button class="stw-btn" onclick="setTab(\'confirmacion\')">Confirmar y pagar</button>';
  } else {
    panel.innerHTML =
      '<div style="text-align:center;padding:20px 0">' +
      '<div style="width:56px;height:56px;border-radius:50%;background:var(--color-primary-light);display:flex;align-items:center;justify-content:center;margin:0 auto 12px">' +
      '<span style="display:inline-flex;width:26px;height:26px;color:var(--color-primary-dark)">' + CHECK_ICON + '</span></div>' +
      '<p style="font-size:15px;font-weight:500;color:var(--color-text);margin:0 0 4px">Pedido confirmado</p>' +
      '<p style="font-size:12px;color:var(--color-text-muted);margin:0">Pagado con ' + payMethod + '</p>' +
      '<div style="background:var(--color-card);border:0.5px solid var(--color-border);border-radius:12px;padding:12px;margin-top:14px;text-align:left">' +
      '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--color-text-muted)"><span>Número de orden</span><span style="color:var(--color-text)">ORD-1234</span></div>' +
      '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--color-text-muted);margin-top:6px"><span>Tiempo estimado</span><span style="color:var(--color-text)">25 min</span></div>' +
      '<div style="background:var(--color-primary-light);border-radius:6px;height:6px;margin-top:10px"><div style="background:var(--color-primary);width:45%;height:100%;border-radius:6px"></div></div></div>' +
      '<button class="stw-btn-outline" onclick="setTab(\'inicio\')" style="margin-top:14px">Volver al inicio</button></div>';
  }
}
</script>
</body>
</html>
